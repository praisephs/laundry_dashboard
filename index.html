<script>
    (function() {
        // ============================================
        // CONFIGURATION
        // ============================================
      //  const GOOGLE_SHEETS_API = 'https://script.google.com/macros/s/AKfycbxDpDaSHK9_esxozLfbJXB18M6huck4vqW7NMOvuVfPPhaTbrQRmLPIUGcCtMcIhEBh/exec'; // ← PASTE YOUR URL HERE
        
        // ---------- STORAGE ----------
        let orders = [];

        // ---------- DOM elements ----------
        const form = document.getElementById('orderForm');
        const nameInp = document.getElementById('customerName');
        const phoneInp = document.getElementById('customerPhone');
        const serviceInp = document.getElementById('serviceType');
        const tbody = document.getElementById('tableBody');
        const pendingSpan = document.getElementById('pendingCount');
        const toastEl = document.getElementById('telegramToast');
        const toastText = document.getElementById('toastText');

        // Helper: show toast message
        function showTelegramNotify(msg) {
            toastText.innerText = msg;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3200);
        }

        // Escape HTML for security
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"']/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return '&#039;';
            });
        }

        // Render orders table
        function renderOrders() {
            if (orders.length === 0) {
                tbody.innerHTML = `<tr class="empty-row"><td colspan="5">🕊️ No orders yet. Use the form to add.</td></tr>`;
                pendingSpan.innerText = 'Pending: 0';
                return;
            }

            let html = '';
            let pendingCount = 0;

            orders.forEach(order => {
                if (order.status === 'Pending') pendingCount++;

                const statusClass = order.status === 'Ready' ? 'ready' : '';
                const serviceBadge = `<span class="service-badge">${order.service}</span>`;

                html += `<tr data-id="${order.id}">
                    <td><i class="fas fa-user-circle" style="color:#30758e; margin-right:6px;"></i>${escapeHtml(order.name)}</td>
                    <td>${escapeHtml(order.phone)}</td>
                    <td>${serviceBadge}</td>
                    <td>
                        <select class="status-select ${statusClass}" onchange="window.updateStatus('${order.id}', this.value)">
                            <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="Ready" ${order.status === 'Ready' ? 'selected' : ''}>✅ Ready</option>
                        </select>
                    </td>
                    <td>
                        <button class="action-btn" onclick="window.deleteOrder('${order.id}')" title="delete order"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            });

            tbody.innerHTML = html;
            pendingSpan.innerText = `Pending: ${pendingCount}`;
        }

        // ============================================
        // GOOGLE SHEETS API FUNCTIONS
        // ============================================

        // Load all orders from Google Sheets
        async function loadOrdersFromDatabase() {
            showTelegramNotify('📤 Loading orders...');
            
            try {
                const response = await fetch(GOOGLE_SHEETS_API);
                const data = await response.json();
                
                if (data.status === 'success' && data.orders) {
                    orders = data.orders.map(row => ({
                        id: row.id,
                        name: row.name,
                        phone: row.phone,
                        service: row.service,
                        status: row.status
                    }));
                    renderOrders();
                    showTelegramNotify(`✅ Loaded ${orders.length} orders`);
                } else {
                    orders = [];
                    renderOrders();
                    showTelegramNotify('📭 No orders found');
                }
            } catch (error) {
                console.error('Failed to load orders:', error);
                showTelegramNotify('❌ Failed to load orders');
                orders = [];
                renderOrders();
            }
        }

        // Save new order to Google Sheets
        async function saveOrderToDatabase(order) {
            const response = await fetch(GOOGLE_SHEETS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerName: order.name,
                    phone: order.phone,
                    service: order.service,
                    status: order.status,
                    amount: order.amount || 0
                })
            });
            
            const data = await response.json();
            
            if (data.status !== 'success') {
                throw new Error(data.message || 'Failed to save order');
            }
            
            return data;
        }

        // Update order status in Google Sheets
        async function updateOrderStatusInDatabase(orderId, newStatus) {
            const response = await fetch(GOOGLE_SHEETS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'update',
                    orderId: orderId,
                    status: newStatus
                })
            });
            
            const data = await response.json();
            
            if (data.status !== 'success') {
                throw new Error(data.message || 'Failed to update order');
            }
            
            return data;
        }

        // ============================================
        // UI ACTION HANDLERS
        // ============================================

        // ---------- ADD ORDER ----------
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = nameInp.value.trim();
            const phone = phoneInp.value.trim();
            const service = serviceInp.value;

            if (!name || !phone || !service) {
                showTelegramNotify('❌ Please fill all fields');
                return;
            }

            // Show loading
            showTelegramNotify('📤 Saving order...');

            try {
                // Save to Google Sheets first
                const result = await saveOrderToDatabase({
                    name: name,
                    phone: phone,
                    service: service,
                    status: 'Pending'
                });

                // Add to local array with the ID from Google Sheets
                orders.push({
                    id: result.orderId,
                    name: name,
                    phone: phone,
                    service: service,
                    status: 'Pending'
                });

                renderOrders();

                // Reset form
                nameInp.value = '';
                phoneInp.value = '';
                serviceInp.value = '';

                showTelegramNotify(`✅ Order added for ${name}`);
                
            } catch (error) {
                console.error('Error saving order:', error);
                showTelegramNotify(`❌ Failed to save order: ${error.message}`);
            }
        });

        // ---------- UPDATE STATUS (AND SEND SMS WHEN READY) ----------
        window.updateStatus = async function(orderId, newStatus) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const oldStatus = order.status;

            // Update locally immediately (optimistic update)
            order.status = newStatus;
            renderOrders();
            showTelegramNotify(`📤 Updating status...`);

            try {
                // Update in Google Sheets
                await updateOrderStatusInDatabase(orderId, newStatus);
                
                // If status changed to "Ready", send SMS
                if (newStatus === 'Ready' && oldStatus !== 'Ready') {
                    await sendSMSNotification(order);
                } else {
                    showTelegramNotify(`✅ Status updated to ${newStatus}`);
                }
                
            } catch (error) {
                // Revert on error
                order.status = oldStatus;
                renderOrders();
                console.error('Error updating status:', error);
                showTelegramNotify(`❌ Update failed: ${error.message}`);
            }
        };

        // ---------- SEND SMS NOTIFICATION ----------
        async function sendSMSNotification(order) {
            const customerName = order.name;
            const phone = order.phone;
            const service = order.service;

            // Your existing SMS sending code (using n8n)
            const CORS_PROXY = 'https://corsproxy.io/?';
            const N8N_URL = encodeURIComponent('https://praisephs2000.app.n8n.cloud/webhook/laundry-sms');

            try {
                const response = await fetch(CORS_PROXY + N8N_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customerName, phone, service })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('SMS sent:', data);
                showTelegramNotify(`✅ SMS sent to ${phone}`);
                
            } catch (error) {
                console.error('Error sending SMS:', error);
                showTelegramNotify(`❌ SMS failed: ${error.message}`);
            }
        }

        // ---------- DELETE ORDER ----------
        window.deleteOrder = function(orderId) {
            // Note: Delete functionality requires additional Google Sheets API endpoint
            // For now, just show message
            showTelegramNotify('❌ Delete requires database sync');
        };

        // ---------- INITIALIZE ----------
        // Load orders from Google Sheets when page starts
        loadOrdersFromDatabase();

    })();
</script>
