<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Touch Laundry Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg">

<h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
Divine Touch Laundry System
</h1>


<!-- LIVE REVENUE PANEL -->

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

<div class="bg-green-100 p-4 rounded-lg text-center">
<p class="text-sm text-gray-600">Today's Revenue</p>
<p id="todayRevenue" class="text-2xl font-bold text-green-700">₦0</p>
</div>

<div class="bg-yellow-100 p-4 rounded-lg text-center">
<p class="text-sm text-gray-600">Pending</p>
<p id="pendingCount" class="text-2xl font-bold text-yellow-700">0</p>
</div>

<div class="bg-blue-100 p-4 rounded-lg text-center">
<p class="text-sm text-gray-600">Ready</p>
<p id="readyCount" class="text-2xl font-bold text-blue-700">0</p>
</div>

<div class="bg-gray-200 p-4 rounded-lg text-center">
<p class="text-sm text-gray-600">Completed</p>
<p id="completedCount" class="text-2xl font-bold text-gray-700">0</p>
</div>

</div>


<!-- ORDER ENTRY FORM -->

<div class="mb-10 bg-blue-50 p-6 rounded-lg">

<h2 class="text-xl font-semibold mb-4 text-blue-800">New Order Entry</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<input type="text" id="customerName" placeholder="Customer Name" class="p-2 border rounded">

<input type="text" id="phone" placeholder="Phone Number" class="p-2 border rounded">

<select id="service" class="p-2 border rounded">
<option value="Wash & Iron">Wash & Iron</option>
<option value="Dry Clean">Dry Clean</option>
<option value="Ironing Only">Ironing Only</option>
</select>

<input type="number" id="clothesCount" placeholder="Clothes Count" class="p-2 border rounded">

<input type="number" id="amount" placeholder="Amount (₦)" class="p-2 border rounded">

</div>

<button onclick="addOrder()" class="mt-4 w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">
Add Order
</button>

</div>


<!-- FILTER BUTTONS -->

<div class="flex gap-3 mb-4">

<button onclick="loadOrders('Pending')" class="bg-yellow-500 text-white px-4 py-2 rounded">
Pending
</button>

<button onclick="loadOrders('Ready')" class="bg-blue-500 text-white px-4 py-2 rounded">
Ready
</button>

<button onclick="loadOrders('Completed')" class="bg-gray-600 text-white px-4 py-2 rounded">
Completed
</button>

</div>


<!-- SEARCH -->

<div class="mb-4 flex gap-3">

<input
id="searchInput"
type="text"
placeholder="Search name or phone"
class="p-2 border rounded w-full"
/>

<button
onclick="searchOrders()"
class="bg-purple-600 text-white px-4 py-2 rounded">
Search
</button>

<button
onclick="loadOrders('Pending')"
class="bg-gray-500 text-white px-4 py-2 rounded">
Reset
</button>

</div>


<!-- ORDERS TABLE -->

<div>

<h2 class="text-xl font-semibold mb-4 text-gray-800">Current Orders</h2>

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead>
<tr class="bg-gray-200">
<th class="p-3 border">Order ID</th>
<th class="p-3 border">Name</th>
<th class="p-3 border">Service</th>
<th class="p-3 border">Clothes</th>
<th class="p-3 border">Amount</th>
<th class="p-3 border">Status</th>
<th class="p-3 border">Action</th>
</tr>
</thead>

<tbody id="orderTableBody">

<tr>
<td colspan="7" class="p-5 text-center text-gray-500">
Loading orders...
</td>
</tr>

</tbody>

</table>

</div>

</div>


<!-- DEBUG -->

<div id="debugInfo" class="mt-4 bg-black text-green-400 p-3 rounded text-sm">
System starting...
</div>

</div>



<script>

const API_URL = "https://uyipraise.app.n8n.cloud/webhook/laundry-api";

let currentFilter = "Pending";

function updateDebug(message){
document.getElementById("debugInfo").innerHTML = message;
}



/* LOAD ORDERS */

async function loadOrders(status="Pending"){

currentFilter = status;

updateDebug("Loading orders...");

const response = await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"load",
status:status
})
});

const data = await response.json();

displayOrders(data);

loadStats(); // refresh stats

}



/* DISPLAY ORDERS */

function displayOrders(data){

const tableBody = document.getElementById("orderTableBody");

let orders=[];

if(Array.isArray(data)) orders=data;
else if(data && Array.isArray(data.orders)) orders=data.orders;
else if(data && typeof data==="object") orders=[data];


if(orders.length===0){

tableBody.innerHTML=`
<tr>
<td colspan="7" class="p-5 text-center text-gray-500">
No orders found
</td>
</tr>`;

updateStats([]);
return;

}


let html="";

orders.forEach(order=>{

const status = order.status || "Pending";

let statusColor="bg-yellow-100 text-yellow-800";

if(status==="Ready") statusColor="bg-blue-100 text-blue-800";
if(status==="Completed") statusColor="bg-gray-200 text-gray-700";


let actionBtn="";

if(status==="Pending"){

actionBtn=`<button onclick="updateStatus('${order.order_id}','Ready','${order.name}','${order.phone}')"
class="bg-green-500 text-white px-3 py-1 rounded text-sm">
Mark Ready</button>`;

}

else if(status==="Ready"){

actionBtn=`<button onclick="updateStatus('${order.order_id}','Completed')"
class="bg-gray-500 text-white px-3 py-1 rounded text-sm">
Complete</button>`;

}

else{

actionBtn="<span class='text-gray-500'>✓ Done</span>";

}


html+=`

<tr class="hover:bg-gray-50">

<td class="p-3 border">${order.order_id}</td>
<td class="p-3 border">${order.name}</td>
<td class="p-3 border">${order.service}</td>
<td class="p-3 border text-center">${order.clothes_count}</td>
<td class="p-3 border">₦${order.amount}</td>

<td class="p-3 border">
<span class="px-2 py-1 rounded text-sm ${statusColor}">
${status}
</span>
</td>

<td class="p-3 border">${actionBtn}</td>

</tr>

`;

});

tableBody.innerHTML=html;

updateStats(orders);

updateDebug("Orders loaded: "+orders.length);

}



/* UPDATE STATUS COUNTS (TABLE ONLY) */

function updateStats(orders){

let pending = 0;
let ready = 0;
let completed = 0;

orders.forEach(order=>{

if(order.status==="Pending") pending++;
if(order.status==="Ready") ready++;
if(order.status==="Completed") completed++;

});

document.getElementById("pendingCount").innerText=pending;
document.getElementById("readyCount").innerText=ready;
document.getElementById("completedCount").innerText=completed;

}



/* LOAD REAL STATS FROM N8N */

async function loadStats(){

try{

const response = await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"stats"
})
});

const data = await response.json();

// FIX: handle array response from n8n
const stats = Array.isArray(data) ? data[0] : data;

document.getElementById("todayRevenue").innerText =
"₦" + Number(stats.todayRevenue || 0).toLocaleString();

document.getElementById("pendingCount").innerText =
stats.pending || 0;

document.getElementById("readyCount").innerText =
stats.ready || 0;

document.getElementById("completedCount").innerText =
stats.completed || 0;

}
catch(error){

console.log("Stats error:", error);

}

}



/* ADD ORDER */

async function addOrder(){

const customerName=document.getElementById("customerName").value;
const phone=document.getElementById("phone").value;
const service=document.getElementById("service").value;
const clothesCount=document.getElementById("clothesCount").value;
const amount=document.getElementById("amount").value;

if(!customerName||!phone){
alert("Enter name and phone");
return;
}

await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"create",
customerName,
phone,
service,
clothesCount,
amount
})
});

alert("Order created");

clearForm();

loadOrders("Pending");

}



/* UPDATE STATUS */

async function updateStatus(orderId,status,name,phone){

if(!confirm("Change order status to "+status+"?")) return;

await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"update",
order_id:orderId,
status:status,
name:name,
phone:phone
})
});

alert("Order updated");

loadOrders(currentFilter);

}



/* SEARCH */

async function searchOrders(){

const searchTerm=document.getElementById("searchInput").value.trim();

if(!searchTerm){
alert("Enter name or phone");
return;
}

updateDebug("Searching...");

const response=await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"search",
term:searchTerm
})
});

const data=await response.json();

displayOrders(data);

}



/* CLEAR FORM */

function clearForm(){
document.getElementById("customerName").value="";
document.getElementById("phone").value="";
document.getElementById("clothesCount").value="";
document.getElementById("amount").value="";
}



/* START SYSTEM */

document.addEventListener("DOMContentLoaded",()=>{
loadStats();
loadOrders("Pending");
});

</script>

</body>
</html>
