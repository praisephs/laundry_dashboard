<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Touch Laundry Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg">

<h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
    Divine Touch Laundry System
</h1>

<!-- ORDER ENTRY FORM -->
<div class="mb-10 bg-blue-50 p-6 rounded-lg">
    <h2 class="text-xl font-semibold mb-4 text-blue-800">New Order Entry</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="text" id="customerName" placeholder="Customer Name" class="p-2 border rounded">
        <input type="text" id="phone" placeholder="Phone Number" class="p-2 border rounded">
        <select id="service" class="p-2 border rounded">
            <option value="Wash & Iron">Wash & Iron</option>
            <option value="Dry Clean">Dry Clean</option>
            <option value="Ironing Only">Ironing Only</option>
        </select>
        <input type="number" id="clothesCount" placeholder="Clothes Count" class="p-2 border rounded">
        <input type="number" id="amount" placeholder="Amount (₦)" class="p-2 border rounded">
    </div>

    <button onclick="addOrder()" class="mt-4 w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">
        Add Order
    </button>
</div>

        <div class="flex gap-3 mb-4">
        
        <button onclick="loadOrders('Pending')" class="bg-yellow-500 text-white px-4 py-2 rounded">
        Pending
        </button>
        
        <button onclick="loadOrders('Ready')" class="bg-blue-500 text-white px-4 py-2 rounded">
        Ready
        </button>
        
        <button onclick="loadOrders('Completed')" class="bg-gray-600 text-white px-4 py-2 rounded">
        Completed
        </button>
        
        </div> 

    <!-- SEARCH BOX -->
            <div class="mb-4 flex gap-3">
        
        <input 
        id="searchInput"
        type="text"
        placeholder="Search name or phone"
        class="p-2 border rounded w-full"
        />
        
        <button 
        onclick="searchOrders()"
        class="bg-purple-600 text-white px-4 py-2 rounded">
        Search
        </button>
        
        <button 
        onclick="loadOrders('Pending')"
        class="bg-gray-500 text-white px-4 py-2 rounded">
        Reset
        </button>
        
        </div>
            

<!-- ORDERS TABLE -->
<div>
    <h2 class="text-xl font-semibold mb-4 text-gray-800">Current Orders</h2>
    
    <div class="overflow-x-auto">
        
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-3 border">Order ID</th>
                    <th class="p-3 border">Name</th>
                    <th class="p-3 border">Service</th>
                    <th class="p-3 border">Clothes</th>
                    <th class="p-3 border">Amount</th>
                    <th class="p-3 border">Status</th>
                    <th class="p-3 border">Action</th>
                </tr>
            </thead>
            <tbody id="orderTableBody">
                <tr>
                    <td colspan="7" class="p-5 text-center text-gray-500">
                        Loading orders...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- DEBUG INFO DIV -->
<div id="debugInfo" class="mt-4 bg-black text-green-400 p-3 rounded text-sm">
    System starting...
</div>

</div>

<script>

/* -----------------------------
N8N WEBHOOK URL
----------------------------- */
const MAIN_WEBHOOK = "https://praisephs2000.app.n8n.cloud/webhook/laundry-api";
//const MAIN_WEBHOOK = "https://praisephs2000.app.n8n.cloud/webhook-test/laundry-api";
const USE_PROXY = false;
const CORS_PROXY = "https://corsproxy.io/?";
const API_URL = USE_PROXY
  ? CORS_PROXY + encodeURIComponent(MAIN_WEBHOOK)
  : MAIN_WEBHOOK;

let lastResponse = null;

/* -----------------------------
DEBUG PANEL SAFE FUNCTION
----------------------------- */
function updateDebug(message) {
    const debugEl = document.getElementById("debugInfo");
    if (!debugEl) {
        console.warn("Debug panel not found:", message);
        return;
    }
    debugEl.innerHTML = message.replace(/\n/g, "<br>");
}

/* -----------------------------
LOAD ORDERS - FIXED FOR EMPTY RESPONSES
----------------------------- */
async function loadOrders(status = "Pending") {
    updateDebug("Loading orders...");
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
          //  body: JSON.stringify({ action: "load" })
            body: JSON.stringify({
            action: "load",
            status: status
        })
        });

        updateDebug("Status: " + response.status);

        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }

        // Check if response has content before parsing
        const responseText = await response.text();
        
        if (!responseText || responseText.trim() === "") {
            updateDebug("⚠️ Empty response received from webhook");
            // Show empty table with message
            displayOrders([]);
            return;
        }

        // Try to parse as JSON
        try {
            const data = JSON.parse(responseText);
            lastResponse = data;
            console.log("Response:", data);
            displayOrders(data);
        } catch (parseError) {
            updateDebug("❌ Invalid JSON: " + responseText.substring(0, 50));
            console.error("Parse error:", parseError);
            displayOrders([]);
        }

    } catch (error) {
        console.error(error);
        updateDebug("ERROR: " + error.message);
        
        const tableBody = document.getElementById("orderTableBody");
        if (tableBody) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="7" class="p-5 text-center text-red-500">
                        Failed to load orders: ${error.message}
                    </td>
                </tr>
            `;
        }
    }
}

/* -----------------------------
DISPLAY ORDERS
----------------------------- */
function displayOrders(data) {
    // SAFETY CHECK - Make sure table body exists
    const tableBody = document.getElementById("orderTableBody");
    if (!tableBody) {
        console.error("Table body element not found!");
        updateDebug("ERROR: Table body element missing");
        return;
    }
    
    let orders = [];

    if (Array.isArray(data)) {
        orders = data;
    } else if (data && Array.isArray(data.orders)) {
        orders = data.orders;
    } else if (data && Array.isArray(data.data)) {
        orders = data.data;
    }

    updateDebug("Orders found: " + orders.length);

    if (orders.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="7" class="p-5 text-center text-gray-500">
                    No orders found
                </td>
            </tr>
        `;
        return;
    }

    let html = "";
    orders.forEach(order => {
        const status = order.status || "Pending";
        let statusColor = "bg-yellow-100 text-yellow-800";
        if (status === "Ready") statusColor = "bg-green-100 text-green-800";
        if (status === "Completed") statusColor = "bg-gray-200 text-gray-700";

        let actionBtn = "";
        if (status === "Pending") {
            actionBtn = `
                <button onclick="updateStatus('${order.order_id}','Ready','${order.name}','${order.phone}')"
                    class="bg-green-500 text-white px-3 py-1 rounded text-sm hover:bg-green-600">
                    Mark Ready
                </button>`;
        } else if (status === "Ready") {
            actionBtn = `
                <button onclick="updateStatus('${order.order_id}','Completed')"
                    class="bg-gray-500 text-white px-3 py-1 rounded text-sm hover:bg-gray-600">
                    Complete
                </button>`;
        } else {
            actionBtn = "<span class='text-gray-500'>✓ Done</span>";
        }

        html += `
            <tr class="hover:bg-gray-50">
                <td class="p-3 border">${order.order_id || ""}</td>
                <td class="p-3 border">${order.name || ""}</td>
                <td class="p-3 border">${order.service || ""}</td>
                <td class="p-3 border text-center">${order.clothes_count || 0}</td>
                <td class="p-3 border">₦${order.amount || 0}</td>
                <td class="p-3 border">
                    <span class="px-2 py-1 rounded text-sm ${statusColor}">
                        ${status}
                    </span>
                </td>
                <td class="p-3 border">
                    ${actionBtn}
                </td>
            </tr>`;
    });

    tableBody.innerHTML = html;
}

/* -----------------------------
ADD ORDER - FIXED
----------------------------- */
async function addOrder() {
    const customerName = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const service = document.getElementById("service").value;
    const clothesCount = document.getElementById("clothesCount").value;
    const amount = document.getElementById("amount").value;

    if (!customerName || !phone) {
        alert("Enter customer name and phone");
        return;
    }

    try {
        updateDebug("Creating order...");
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "create",
                customerName,
                phone,
                service,
                clothesCount,
                amount
            })
        });

        // Check if response has content
        const responseText = await response.text();
        
        if (responseText && responseText.trim() !== "") {
            try {
                const data = JSON.parse(responseText);
                lastResponse = data;
                console.log("Create response:", data);
            } catch (e) {
                console.log("Non-JSON response:", responseText);
            }
        } else {
            console.log("Empty response from create");
        }
        
        alert("Order created");
        clearForm();
        loadOrders();

    } catch (error) {
        updateDebug("ERROR creating order: " + error.message);
        alert("Failed to create order: " + error.message);
    }
}

/* -----------------------------
UPDATE STATUS - FIXED
----------------------------- */
async function updateStatus(orderId, status, name, phone) {
    if (!confirm("Change order status to " + status + "?")) return;

    const payload = {
        action: "update",
        order_id: orderId,
        status: status
    };

    if (name) payload.name = name;
    if (phone) payload.phone = phone;

    try {
        updateDebug("Updating order...");
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        // Check if response has content
        const responseText = await response.text();
        
        if (responseText && responseText.trim() !== "") {
            try {
                const data = JSON.parse(responseText);
                lastResponse = data;
                console.log("Update response:", data);
            } catch (e) {
                console.log("Non-JSON update response:", responseText);
            }
        }
        
        alert("Order updated");
        loadOrders();

    } catch (error) {
        updateDebug("ERROR updating order: " + error.message);
        alert("Failed to update order: " + error.message);
    }
}

/* -----------------------------
CLEAR FORM
----------------------------- */
function clearForm() {
    document.getElementById("customerName").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("clothesCount").value = "";
    document.getElementById("amount").value = "";
}

/* -----------------------------
PAGE START - Wait for DOM to load
----------------------------- */
document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM fully loaded, initializing...");
    loadOrders("Pending");
});

      // SEARCH FUNCTION
    
        async function searchOrders(){
    
    const searchTerm = document.getElementById("searchInput").value.trim();
    
    if(!searchTerm){
    alert("Enter name or phone");
    return;
    }
    
    updateDebug("Searching orders...");
    
    const response = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
    action:"search",
    term: searchTerm
    })
    });
    
    const data = await response.json();
    
    displayOrders(data);
    
    }

</script>

</body>
</html>
